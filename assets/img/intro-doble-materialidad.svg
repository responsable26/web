<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" width="520" height="420" role="img" aria-label="Ilustración placeholder de matriz de doble materialidad">
  <rect width="520" height="420" rx="16" fill="#f7f7fb"/>
  <rect x="1" y="1" width="518" height="418" rx="16" fill="none" stroke="#e5e6ef"/>

  <!-- ejes -->
  <line x1="70" y1="350" x2="470" y2="350" stroke="#1C2367" stroke-width="2"/>
  <line x1="70" y1="350" x2="70" y2="60" stroke="#1C2367" stroke-width="2"/>

  <!-- cuadrante prioritario -->
  <rect x="280" y="60" width="190" height="140" fill="#17b3a3" opacity="0.14"/>

  <!-- burbujas ESG -->
  <circle cx="380" cy="120" r="34" fill="#DC1767"/>
  <circle cx="300" cy="180" r="24" fill="#DC1767" opacity="0.8"/>
  <circle cx="200" cy="250" r="20" fill="#1C2367" opacity="0.55"/>
  <circle cx="140" cy="300" r="15" fill="#17b3a3" opacity="0.7"/>

  <!-- etiquetas -->
  <text x="270" y="392" text-anchor="middle" font-family="Poppins, sans-serif" font-size="15" fill="#4a4d63">Materialidad de impacto</text>
  <text x="40" y="205" text-anchor="middle" font-family="Poppins, sans-serif" font-size="15" fill="#4a4d63" transform="rotate(-90 40 205)">Materialidad financiera</text>
  <text x="375" y="45" text-anchor="middle" font-family="Poppins, sans-serif" font-size="13" font-weight="600" fill="#17b3a3">Prioritario</text>
</svg>
